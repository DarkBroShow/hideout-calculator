services:
  db:
    image: postgres:16-alpine
    container_name: hideout-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: hideout-backend
    env_file:
      - ./backend/.env
    depends_on:
      - db
    ports:
      - "${BACKEND_PORT_EXTERNAL}:${BACKEND_PORT}"
    volumes:
      - ./backend/stalcraft-database:/app/stalcraft-database:ro
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: hideout-frontend
    env_file:
      - ./frontend/.env
    ports:
      - "${FRONTEND_PORT_EXTERNAL}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data: